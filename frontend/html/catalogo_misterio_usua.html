<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Misterio</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_usua.css">
    <script src="../js/script_usua.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=book_5" />
        
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .fondo{
            background-image: url("../img/logo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.30; 
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; 
        }

        /* Estilos para las tarjetas, manteniendo la apariencia original */
        .catalogo-accion {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .tarjeta-libro {
            background: rgba(255,255,255,0.9);
            border: 1px solid #7f5539;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .tarjeta-libro img {
            max-width: 150px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
        .tarjeta-libro h3 {
            margin: 10px 0 5px;
            color: #7f5539;
        }
        .tarjeta-libro .autor, .tarjeta-libro .precio {
            margin: 5px 0;
        }
        .botones {
            margin-top: 10px;
        }
        .botones button {
            margin: 5px;
            padding: 5px 10px;
            cursor: pointer;
        }
        .agregar {
            background-color: #7f5539;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
        }
        .agregar:hover {
            background-color: #5e3f2a;
        }
        .mensaje-carrito {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .mensaje-carrito.mostrar {
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Menú responsivo -->
    <nav class="navbar">
        <div class="logo">
            <img src="../img/logo_libreria.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            ☰
        </div>

        <ul class="nav-links" id="navLinks">
            <li class="dropdown"></li>
            <li class="dropdown">
                <i class="material-symbols-outlined" style="font-size: 24px;color:#7f5539;">book_5</i>
                <a href="../html/generos_usua.html" onclick="toggleDropdown(event)" class="active">Géneros</a>

                <ul class="dropdown-menu" id="submenu">
                    <li><a href="../html/catalogo_accion_usua.html">Acción</a></li>
                    <li><a href="../html/catalogo_terror_usua.html">Terror</a></li>
                    <li><a href="../html/catalogo_aventura_usua.html">Aventura</a></li>
                    <li><a href="../html/catalogo_ciencia_ficcion_usua.html">Ciencia Ficción</a></li>
                    <li><a href="../html/catalogo_suspenso_usua.html">Suspenso</a></li>
                    <li><a href="../html/catalogo_drama_usua.html">Drama</a></li>
                    <li><a href="../html/catalogo_infantil_usua.html">Infantil</a></li>
                    <li><a href="../html/catalogo_misterio_usua.html">Misterio</a></li>
                    <li><a href="../html/catalogo_romance_usua.html">Romance</a></li>
                </ul>
            </li>
            <i class="material-icons" style="font-size:24px;color: #7f5539;">shopping_cart</i>
            <li>
                <a href="../html/carrito_usua.html">
                    Carrito <span id="contador-carrito">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <script>
        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }
        function toggleDropdown(event) {
            event.preventDefault();
            document.getElementById("submenu").classList.toggle("show");
        }
    </script>

    <div class="fondo"></div>

    <h1>Catálogo Misterio</h1>

    <!-- Contenedor para los libros (se llenará dinámicamente) -->
    <div class="catalogo-accion" id="contenedor-libros"></div>

    <div id="mensaje-carrito" class="mensaje-carrito">
        ✔ Libro agregado al carrito
    </div>

    <script>
        // --- Cargar libros desde el backend ---
        async function cargarLibros() {
            try {
                const response = await fetch('http://localhost:8080/api/libros/categoria/misterio');
                if (!response.ok) throw new Error('Error al cargar libros');
                const libros = await response.json();
                const contenedor = document.getElementById('contenedor-libros');
                contenedor.innerHTML = '';
                
                libros.forEach(libro => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-libro';
                    tarjeta.setAttribute('data-id', libro.id);
                    
                    tarjeta.innerHTML = `
                        <img src="../img/${libro.imagen}" alt="${libro.titulo}" 
                             onerror="this.src='../img/logo_libreria.jpeg'">
                        <h3>${libro.titulo}</h3>
                        <p class="autor">${libro.autor}</p>
                        <p class="precio">$${libro.precio} MXN</p>
                        <div class="botones">
                            <button class="cantidad">Cantidad ${libro.cantidad}</button>
                            <button class="agregar">Agregar</button>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                });
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudieron cargar los libros');
            }
        }

        // --- Funcionalidad del carrito (event delegation) ---
        function inicializarCarrito() {
            const contenedor = document.getElementById('contenedor-libros');
            const contador = document.getElementById('contador-carrito');
            const mensaje = document.getElementById('mensaje-carrito');

            // Cargar carrito desde localStorage
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if (contador) contador.textContent = carrito.length;

            // Delegación de eventos para botones "Agregar"
            contenedor.addEventListener('click', (e) => {
                const boton = e.target.closest('.agregar');
                if (!boton) return;

                const tarjeta = boton.closest('.tarjeta-libro');
                if (!tarjeta) return;

                const titulo = tarjeta.querySelector('h3').textContent;
                const precioTexto = tarjeta.querySelector('.precio').textContent;
                // Extraer número del precio (ej: "$287.20 MXN" → 287.20)
                const precio = parseFloat(precioTexto.replace('$', '').replace(' MXN', ''));
                const imagen = tarjeta.querySelector('img').src;

                const libro = { titulo, precio, imagen };
                carrito.push(libro);
                localStorage.setItem('carrito', JSON.stringify(carrito));
                if (contador) contador.textContent = carrito.length;

                // Mostrar mensaje
                if (mensaje) {
                    mensaje.classList.add('mostrar');
                    setTimeout(() => {
                        mensaje.classList.remove('mostrar');
                    }, 2000);
                }
            });
        }

        // --- Inicialización ---
        document.addEventListener('DOMContentLoaded', () => {
            cargarLibros();
            inicializarCarrito();
        });
    </script>
</body>
</html>
