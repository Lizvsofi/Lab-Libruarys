<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Misterio</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_usua.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
                  .logo img {
                height: 50px;
                border: 2px solid white;
                border-radius: 50%;
            }
                    .navbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background-color: #e9dfc8;
                padding: 10px 20px;
                box-shadow: 0 2px 5px rgba(0,0,0,0.1);
                position: relative;
                z-index: 1000;
            }

            .nav-links {
                display: flex;
                align-items: center;
                list-style: none;
                gap: 20px;
                margin: 0;
            }

            .nav-links li {
                display: flex;
                align-items: center;
                gap: 5px;
                position: relative; /* Necesario para posicionar el submenú */
            }

            .nav-links a {
                text-decoration: none;
                color: #7f5539;
                font-weight: bold;
            }
    .dropdown-menu {
                display: none; /* Oculto por defecto */
                position: absolute;
                top: 100%;
                left: 0;
                background-color: #e9dfc8;
                min-width: 160px;
                box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
                list-style: none;
                padding: 10px 0;
                margin: 0;
                border-radius: 4px;
        
            }
           

            .dropdown-menu li {
                display: block;
                padding: 8px 16px;
            }

            .dropdown-menu li a {
                font-weight: normal;
                display: block;
                width: 100%;
            }

            .dropdown-menu li:hover {
                background-color: #cfb68e;
            }

            /* Clase que activa el despliegue */
            .dropdown.show .dropdown-menu {
                display: block;
            }

            .hamburger {
                display: none;
            }

            @media (max-width: 768px) {
                .hamburger { display: block; }
                .nav-links { display: none; }
                .nav-links.active { display: flex; flex-direction: column; position: absolute; top: 70px; right: 0; background: #fff; width: 100%; padding: 20px; }
            }

        .catalogo-accion {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .tarjeta-libro {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #7f5539;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .tarjeta-libro img {
            max-width: 150px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
        .botones {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .cantidad, .agregar {
            background-color: #7f5539;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .agregar { background-color: #b8860b; }
        .mensaje-carrito {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 4000;
        }
        .mensaje-carrito.mostrar { opacity: 1; }
    </style>
</head>
<body>
    <div class="fondo"></div>

    <nav class="navbar">
        <a href="generos_usua.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 10px;">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="../img/logo_libreria.jpeg" alt="Logo de Libruarys"/>
                <span style="font-family: poppins, sans-serif; font-weight: bold; font-size: 1.2rem; color: #b8860b;">Libruarys</span>
            </div>
        </a>

        <div class="hamburger" onclick="toggleMenu()" style="cursor: pointer; font-size: 24px;">☰</div>

        <ul class="nav-links" id="navLinks">
            <li class="dropdown" id="generosDropdown">
                <span class="material-symbols-outlined" style="color:#7f5539;">library_books</span>
                <a href="#" onclick="toggleDropdown(event)">Géneros ▾</a>
                <ul class="dropdown-menu">
                    <li><a href="catalogo_accion_usua.html">Acción</a></li>
                    <li><a href="catalogo_terror_usua.html">Terror</a></li>
                    <li><a href="catalogo_aventura_usua.html">Aventura</a></li>
                    <li><a href="catalogo_ciencia_ficcion_usua.html">Ciencia Ficción</a></li>
                    <li><a href="catalogo_suspenso_usua.html">Suspenso</a></li>
                    <li><a href="catalogo_drama_usua.html">Drama</a></li>
                    <li><a href="catalogo_infantil_usua.html">Infantil</a></li>
                    <li><a href="catalogo_misterio_usua.html">Misterio</a></li>
                    <li><a href="catalogo_romance_usua.html">Romance</a></li>
                </ul>
            </li>

            <li>
                <span class="material-icons dropdown" style="color: #7f5539;">shopping_cart</span>
                <a href="carrito_usua.html">Carrito <span id="contador-carrito">0</span></a>
            </li>

            <li>
                <span class="material-symbols-outlined dropdown" style="color: #7f5539;">logout</span>
                <a href="index.html" onclick="localStorage.clear(); sessionStorage.clear();" class="dropdown">Cerrar Sesión</a>
            </li>
        </ul>
    </nav>

    <h1 style="font-family: poppins,sans-serif;  font-size: 3em; font-weight: bold;  text-align: center; color: #b8860b; margin-top: 20px;">Catálogo Misterio</h1>
    <div class="catalogo-accion" id="contenedor-libros"></div>
    <div id="mensaje-carrito" class="mensaje-carrito">✔ Libro agregado al carrito</div>

    <script>
    function toggleMenu(){
        document.getElementById("navLinks").classList.toggle("active");
    }

    function toggleDropdown(event) {
        event.preventDefault();
        const dropdown = document.getElementById("generosDropdown");
        dropdown.classList.toggle("show");
    }

    async function cargarLibros() {
        try {
            const idLibreria = 133; 
            const response = await fetch('http://localhost:8080/api/libros/categoria/misterio');
            if (!response.ok) throw new Error('Error al cargar libros');
            const libros = await response.json();
            const contenedor = document.getElementById('contenedor-libros');
            contenedor.innerHTML = '';
            
            for (const libro of libros) {
                const tarjeta = document.createElement('div');
                tarjeta.className = 'tarjeta-libro';
                tarjeta.setAttribute('data-id', libro.id);

                const imagenSrc = libro.imagen ? `../img/${libro.imagen}` : '../img/logo_libreria.jpeg';
                
                tarjeta.innerHTML = `
                    <img src="${imagenSrc}" alt="${libro.titulo}" onerror="this.src='../img/logo_libreria.jpeg'">
                    <h3>${libro.titulo}</h3>
                    <p class="autor">${libro.autor}</p>
                    <p class="precio">$${libro.precio} MXN</p>
                    <div class="botones">
                        <button class="cantidad" id="stock-${libro.id}" disabled>Stock: Cargando...</button>
                        <button class="agregar" data-id="${libro.id}">Agregar</button>
                    </div>
                `;
                contenedor.appendChild(tarjeta);

                // Petición adicional para obtener el stock real de la tabla 'existencia'
                try {
                    const resStock = await fetch(`http://localhost:8080/api/existencias/${idLibreria}/${libro.id}`);
                    const dataStock = await resStock.json();
                    const botonStock = document.getElementById(`stock-${libro.id}`);
                    botonStock.textContent = `Stock: ${dataStock.cantidad || 0}`;
                } catch (errStock) {
                    document.getElementById(`stock-${libro.id}`).textContent = "Stock: N/A";
                }
            }
        } catch (error) { 
            console.error('Error:', error);
            document.getElementById('contenedor-libros').innerHTML = '<p>Error al conectar con el servidor.</p>';
        }
    }

    function inicializarCarrito() {
        const contador = document.getElementById('contador-carrito');
        
        document.getElementById('contenedor-libros').addEventListener('click', (e) => {
            const boton = e.target.closest('.agregar');
            if (!boton) return;

            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const tarjeta = boton.closest('.tarjeta-libro');
            
            const libro = {
                id: parseInt(boton.getAttribute('data-id')),
                titulo: tarjeta.querySelector('h3').textContent,
                precio: tarjeta.querySelector('.precio').textContent.replace('$', '').replace(' MXN', '').trim(),
                imagen: tarjeta.querySelector('img').src,
                cantidad: 1 
            };

            if (isNaN(libro.id)) {
                console.error("Error: ID no válido");
                return;
            }

            carrito.push(libro);
            localStorage.setItem('carrito', JSON.stringify(carrito));
            
            if (contador) contador.textContent = carrito.length;

            const mensaje = document.getElementById('mensaje-carrito');
            mensaje.classList.add('mostrar');
            setTimeout(() => mensaje.classList.remove('mostrar'), 2000);
        });

        const carritoInicial = JSON.parse(localStorage.getItem('carrito')) || [];
        if (contador) contador.textContent = carritoInicial.length;
    }

    document.addEventListener('DOMContentLoaded', () => {
        cargarLibros();
        inicializarCarrito();
    });
    </script>
</body>
</html>
