<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Ticket de compra</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_usua.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
        .ticket { max-width: 500px; margin: 20px auto; background: white; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 30px; font-family: 'Courier New', monospace; }
        .ticket h1 { text-align: center; color: #7f5539; margin: 0 0 10px 0; }
        .ticket .fecha { text-align: center; color: #666; font-size: 13px; margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .ticket-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding: 10px 0; font-size: 14px; }
        .ticket-item span:first-child { font-weight: bold; flex: 1; }
        .ticket-total { font-weight: bold; font-size: 20px; text-align: right; margin-top: 20px; border-top: 2px solid #7f5539; padding-top: 15px; color: #333; }
        .acciones { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        @media print { .acciones { display: none; } body { background: white; padding: 0; } .ticket { box-shadow: none; border: none; width: 100%; } }
        button { background-color: #7f5539; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        button:hover { background-color: #5e3f2a; }
        .mensaje { text-align: center; color: #4CAF50; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="ticket">
        <h1>🧾 Libruarys</h1>
        <div class="fecha" id="fecha"></div>
        <div id="ticketBody"></div>
        <div id="totalDiv" class="ticket-total"></div>
        <div class="acciones">
            <button onclick="window.print()">🖨️ Imprimir ticket</button>
            <button onclick="volverAlInicio()">🏠 Volver al inicio</button>
        </div>
        <div class="mensaje">¡Gracias por tu compra!</div>
    </div>

    <script>
        function volverAlInicio() {
            // Limpiamos los datos de la compra solo al salir
            sessionStorage.removeItem('ultimaCompra');
            window.location.href = 'generos_usua.html';
        }

        function cargarTicket() {
            const data = sessionStorage.getItem('ultimaCompra');
            if (!data) {
                alert("No hay datos de compra disponibles.");
                window.location.href = 'generos_usua.html';
                return;
            }

            const compra = JSON.parse(data);
            document.getElementById('fecha').textContent = "Fecha: " + compra.fecha;

            const ticketBody = document.getElementById('ticketBody');
            ticketBody.innerHTML = '';

            // 'compra.items' ahora existe porque lo definimos así en el carrito
            compra.items.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'ticket-item';
                itemDiv.innerHTML = `
                    <span>📖 ${item.titulo} (x${item.cantidad})</span>
                    <span>$${subtotal.toFixed(2)}</span>
                `;
                ticketBody.appendChild(itemDiv);
            });

            document.getElementById('totalDiv').innerHTML = `TOTAL: $${parseFloat(compra.total).toFixed(2)} MXN`;
        }

        document.addEventListener('DOMContentLoaded', cargarTicket);
    </script>
</body>
</html>
