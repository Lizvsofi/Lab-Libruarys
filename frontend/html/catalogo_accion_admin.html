<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Acción</title>
    <link rel="shortcut icon" href="../logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/AnaCSS.css"> <script src="../js/AnaJS.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=book_5" />
        
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .fondo {
            /* Ruta corregida para la imagen de fondo */
            background-image: url("../logo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.15; 
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; 
        }

        /* Estilo rápido para la cuadrícula de libros */
        .catalogo-accion {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .tarjeta-libro {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #7f5539;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .tarjeta-libro img {
            max-width: 150px;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="fondo"></div>

    <nav class="navbar">
        <div class="logo">
            <img src="../logo.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            ☰
        </div>

        <ul class="nav-links" id="navLinks">
            <li><a href="../html/index.html"><i class="fa fa-home"></i> Inicio</a></li>
            
            <li class="dropdown">
                <a href="#"><i class="material-symbols-outlined">book_5</i> Géneros</a>
                <ul class="dropdown-menu">
                    <li><a href="catalogo_accion.html">Acción</a></li>
                    <li><a href="catalogo_terror.html">Terror</a></li>
                    <li><a href="catalogo_aventura.html">Aventura</a></li>
                </ul>
            </li>

            <li>
                <a href="carrito.html">
                    <i class="material-icons">shopping_cart</i> 
                    Carrito (<span id="contador-carrito">0</span>)
                </a>
            </li>
        </ul>
    </nav>

    <h1 style="text-align: center; color: #7f5539; margin-top: 20px;">Catálogo de Acción</h1>

    <div class="catalogo-accion" id="contenedor-libros">
        
        <div class="tarjeta-libro" data-id="221"> <div class="top-libro">
                <span class="codigo-libro">SKU: 221</span>
            </div>
            <img src="../img/bourne_identity.jpg" alt="The Bourne Identity">
            <div class="info-libro">
                <h3 class="nombre-libro">The Bourne Identity</h3>
                <p class="autor">Robert Ludlum</p>
                <p class="precio">$321.14 MXN</p>
            </div>
            <div class="botones">
                <p>Disponibles: 10</p>
                <button class="agregar" onclick="agregarAlCarrito(221)" style="background-color: #7f5539; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px;">
                    Agregar al Pedido
                </button>
            </div>
        </div>

        </div>

    <script>
        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }
        
        function agregarAlCarrito(id) {
            alert("Libro " + id + " agregado a tu orden");
            // Aquí irá la lógica de Java/JS para el carrito
        }
    </script>
</body>
</html>
