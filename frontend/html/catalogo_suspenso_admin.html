<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Suspenso (Admin)</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_admin.css">
    <link rel="stylesheet" href="../css/barra.css"> 
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .fondo{
            background-image: url("../img/logo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.30; 
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; 
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
        }
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        .btn-agregar-libro {
            background-color: #7f5539;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
        }
        .info-libro p {
            margin: 2px 0;
            line-height: 1.2;
        }
        .logo-admin-link {
            text-decoration: none; 
            color: inherit;         
            display: flex;          
            align-items: center;
        }
        .logo-admin-link:hover {
            opacity: 0.8;           
        }
    </style>
</head>
<body>
    <div class="fondo"></div>

    <nav class="navbar-admin">
        <a href="generos_admin.html" class="logo-admin-link">
            <div class="logo-admin">
                <img src="../img/logo_libreria.jpeg" alt="Logo" class="logo-admin-img"/>
            </div>
            <span class="logo-admin-text">Libruarys</span>
        </a>

        <div class="hamburger-admin" onclick="toggleMenu()">☰</div>

        <ul class="nav-admin-links" id="navLinks">
            <li class="nav-admin-item dropdown-admin" id="generosDropdown">
                <span class="material-symbols-outlined" style="color: #7f5539;">library_books</span>
                <a href="#" style="color: #7f5539;" onclick="toggleDropdown(event)">Géneros ▾</a>
                <ul class="dropdown-admin-menu">
                    <li><a href="../html/catalogo_accion_admin.html">Acción</a></li>
                    <li><a href="../html/catalogo_terror_admin.html">Terror</a></li>
                    <li><a href="../html/catalogo_aventura_admin.html">Aventura</a></li>
                    <li><a href="../html/catalogo_ciencia_ficcion_admin.html">Ciencia Ficción</a></li>
                    <li><a href="../html/catalogo_suspenso_admin.html">Suspenso</a></li>
                    <li><a href="../html/catalogo_drama_admin.html">Drama</a></li>
                    <li><a href="../html/catalogo_infantil_admin.html">Infantil</a></li>
                    <li><a href="../html/catalogo_misterio_admin.html">Misterio</a></li>
                    <li><a href="../html/catalogo_romance_admin.html">Romance</a></li>
                </ul>
            </li>

            <li class="nav-admin-item">
                <span class="material-symbols-outlined" style="color: #d32f2f;">logout</span>
                <a href="index.html" class="btn-admin-salir" onclick="localStorage.clear();">Cerrar Sesión</a>
            </li>
        </ul>
    </nav>

    <h1 style="text-align: center; color: #5d4037; margin-top: 20px;">Catálogo Suspenso</h1>

    <div style="text-align: right;">
        <button class="btn-agregar-libro" id="btnAgregarLibro">+ Agregar Libro</button>
    </div>

    <div class="catalogo-accion" id="contenedor-libros"></div>

    <div id="modalLibro" class="modal">
        <div class="modal-content">
            <h3 id="modalTitulo">Agregar Nuevo Libro</h3>
            <form id="formLibro">
                <input type="hidden" id="libroId">
                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="autor" placeholder="Autor" required>
                <input type="text" id="editorial" placeholder="Editorial" required>
                <input type="number" id="precio" placeholder="Precio" step="0.01" required>
                <input type="number" id="cantidad" placeholder="Cantidad" required>
                <input type="text" id="imagen" placeholder="Ruta de imagen (ej. it.jpg)" required>
                <input type="text" id="edicion" placeholder="Edición (ej. 1, 2, 3...)">
                <input type="hidden" id="categoria" value="suspenso">
                <div style="margin-top:10px;">
                    <button type="submit" style="background:#7f5539; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Guardar</button>
                    <button type="button" onclick="cerrarModal()" style="padding:8px 15px; border-radius:4px; cursor:pointer;">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const ID_LIBRERIA = 133; // ID fijo de sucursal

        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }
        function toggleDropdown(event) {
            event.preventDefault();
            document.getElementById("generosDropdown").classList.toggle("show");
        }
        window.onclick = function(event) {
            if (!event.target.matches('.dropdown-admin a')) {
                const drop = document.getElementById("generosDropdown");
                if(drop && drop.classList.contains('show')) drop.classList.remove('show');
            }
        }

        async function cargarLibros() {
            try {
                const response = await fetch('http://localhost:8080/api/libros/categoria/suspenso');
                if (!response.ok) throw new Error('Error al cargar libros');
                const libros = await response.json();
                const contenedor = document.getElementById('contenedor-libros');
                contenedor.innerHTML = '';
                
                for (const libro of libros) {
                    // Consultar stock real desde la tabla existencia
                    let stockActual = 0;
                    try {
                        const resStock = await fetch(`http://localhost:8080/api/existencias/${ID_LIBRERIA}/${libro.id}`);
                        if(resStock.ok) {
                            const dataStock = await resStock.json();
                            stockActual = dataStock.cantidad;
                        }
                    } catch(e) { console.error("No se pudo obtener stock para libro " + libro.id); }

                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-libro';
                    tarjeta.setAttribute('data-id', libro.id);
                    const codigo = 'L-' + libro.id.toString().padStart(3, '0');
                    const edicionTexto = libro.edicion ? `<p class="edicion"><strong>Edición:</strong> ${libro.edicion}</p>` : '';
                    
                    tarjeta.innerHTML = `
                        <div class="top-libro">
                            <span class="codigo-libro">${codigo}</span>
                            <button class="editar-libro" onclick="editarLibro(${libro.id}, ${stockActual})">Editar</button>
                            <button class="eliminar-libro" onclick="eliminarLibro(${libro.id})">Eliminar</button>
                        </div>
                        <img src="../img/${libro.imagen}" alt="${libro.titulo}" 
                             onerror="this.src='../img/logo_libreria.jpeg'">
                        <div class="info-libro">
                            <h3 class="nombre-libro">${libro.titulo}</h3>
                            <p class="autor"><strong>Autor:</strong> ${libro.autor}</p>
                            <p class="editorial"><strong>Editorial:</strong> ${libro.editorial}</p>
                            ${edicionTexto}
                            <p class="precio"><strong>Precio:</strong> $${libro.precio} MXN</p>
                            <p class="stock"><strong>Disponible:</strong> ${stockActual}</p>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        async function eliminarLibro(id) {
    if (!confirm("¿Seguro que deseas eliminar este libro?")) return;
    try {
        const response = await fetch(`http://localhost:8080/api/libros/${id}`, { method: 'DELETE' });
        if (response.ok) {
            alert("Libro eliminado");
            cargarLibros();  // recargar la lista
        } else {
            alert("Error al eliminar");
        }
    } catch (error) {
        console.error(error);
        alert("Error de conexión");
    }
}

        function abrirModalAgregar() {
            document.getElementById('modalTitulo').innerText = 'Agregar Nuevo Libro';
            document.getElementById('formLibro').reset();
            document.getElementById('libroId').value = '';
            document.getElementById('modalLibro').style.display = 'block';
        }

        async function editarLibro(id, stockActual) {
            try {
                const response = await fetch(`http://localhost:8080/api/libros/${id}`);
                const libro = await response.json();
                document.getElementById('modalTitulo').innerText = 'Editar Libro';
                document.getElementById('libroId').value = libro.id;
                document.getElementById('titulo').value = libro.titulo;
                document.getElementById('autor').value = libro.autor;
                document.getElementById('editorial').value = libro.editorial;
                document.getElementById('precio').value = libro.precio;
                document.getElementById('cantidad').value = stockActual; // Cargar stock real en el input
                document.getElementById('imagen').value = libro.imagen;
                document.getElementById('edicion').value = libro.edicion || '';
                document.getElementById('categoria').value = libro.categoria;
                document.getElementById('modalLibro').style.display = 'block';
            } catch (error) { alert('Error al cargar libro'); }
        }

        function cerrarModal() {
            document.getElementById('modalLibro').style.display = 'none';
        }

        document.getElementById('formLibro').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('libroId').value;
            const cantidadForm = parseInt(document.getElementById('cantidad').value);

            const libroData = {
                id: id || null,
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                editorial: document.getElementById('editorial').value,
                precio: parseFloat(document.getElementById('precio').value),
                imagen: document.getElementById('imagen').value,
                edicion: document.getElementById('edicion').value,
                categoria: document.getElementById('categoria').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `http://localhost:8080/api/libros/${id}` : 'http://localhost:8080/api/libros';

            try {
                // 1. Guardar datos del libro
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(libroData)
                });

                if (response.ok) {
                    const libroConfirmado = await response.json();
                    
                    // 2. Guardar cantidad en la tabla 'existencia'
                    const existenciaData = {
                        id_libreria: ID_LIBRERIA,
                        id_libro: libroConfirmado.id,
                        cantidad: cantidadForm
                    };

                    await fetch(`http://localhost:8080/api/existencias`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(existenciaData)
                    });

                    cerrarModal(); 
                    cargarLibros(); 
                }
            } catch (error) { 
                console.error(error);
                alert('Error al guardar el libro o el stock'); 
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            cargarLibros();
            document.getElementById('btnAgregarLibro').addEventListener('click', abrirModalAgregar);
        });
    </script>
</body>
</html>
