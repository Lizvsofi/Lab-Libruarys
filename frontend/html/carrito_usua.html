<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Carrito</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_usua.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=book_5" />
    <style>
        body {
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .fondo {
            background-image: url("../img/logo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.30;
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .contenedor-carrito {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #lista-carrito {
            flex: 2;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            padding: 20px;
        }
        .panel-pago {
            flex: 1;
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .item-carrito {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
        .item-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .item-info img {
            width: 60px;
            height: 80px;
            object-fit: cover;
        }
        .quitar {
            background-color: #b8860B;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        #btn-pagar {
            background-color: #7f5539;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        #btn-pagar:hover {
            background-color: #5e3f2a;
        }
        .mensaje {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .mensaje.error {
            background: #f44336;
        }
        .mensaje.mostrar {
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../img/logo_libreria.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li class="dropdown">
                <i class="material-symbols-outlined" style="font-size: 24px;color:#7f5539;">book_5</i>
                <a href="../html/generos_usua.html" onclick="toggleDropdown(event)" class="active">Géneros</a>
                <ul class="dropdown-menu" id="submenu">
                    <li><a href="../html/catalogo_accion_usua.html">Acción</a></li>
                    <li><a href="../html/catalogo_terror_usua.html">Terror</a></li>
                    <li><a href="../html/catalogo_aventura_usua.html">Aventura</a></li>
                    <li><a href="../html/catalogo_ciencia_ficcion_usua.html">Ciencia Ficción</a></li>
                    <li><a href="../html/catalogo_suspenso_usua.html">Suspenso</a></li>
                    <li><a href="../html/catalogo_drama_usua.html">Drama</a></li>
                    <li><a href="../html/catalogo_infantil_usua.html">Infantil</a></li>
                    <li><a href="../html/catalogo_misterio_usua.html">Misterio</a></li>
                    <li><a href="../html/catalogo_romance_usua.html">Romance</a></li>
                </ul>
            </li>
            <i class="material-icons" style="font-size:24px;color: #7f5539;">shopping_cart</i>
            <li><a href="../html/carrito_usua.html">Carrito</a></li>
        </ul>
    </nav>

    <script>
        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }
        function toggleDropdown(event) {
            event.preventDefault();
            document.getElementById("submenu").classList.toggle("show");
        }
    </script>

    <div class="fondo"></div>

    <h2 class="titulo-compras">Carrito de Compras</h2>

    <div class="contenedor-carrito">
        <div id="lista-carrito"></div>
        <div class="panel-pago">
            <h3>Resumen de compra</h3>
            <p>Total de libros: <span id="total-libros">0</span></p>
            <p class="precio-total">Total a pagar: $<span id="total-precio">0</span></p>
            <button id="btn-pagar">Pagar</button>
        </div>
    </div>

    <div id="mensaje" class="mensaje">✔ Compra realizada</div>

    <script>
        // Mostrar carrito
        function mostrarCarrito() {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const contenedor = document.getElementById('lista-carrito');
            const totalLibrosSpan = document.getElementById('total-libros');
            const totalPrecioSpan = document.getElementById('total-precio');

            contenedor.innerHTML = '';
            let totalLibros = 0;
            let totalPrecio = 0;

            
            const agrupado = new Map();
            carrito.forEach(item => {
    const precio = Number(item.precio);          
    const id = Number(item.id);                  
    if (agrupado.has(id)) {
        const existente = agrupado.get(id);
        existente.cantidad += 1;
        existente.precioTotal += precio;
    } else {
        agrupado.set(id, {
            id: id,
            titulo: item.titulo,
            precio: precio,
            imagen: item.imagen,
            cantidad: 1,
            precioTotal: precio
        });
    }
});

            agrupado.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'item-carrito';
                itemDiv.innerHTML = `
                    <div class="item-info">
                        <img src="${item.imagen}" alt="${item.titulo}">
                        <div>
                            <b>${item.titulo}</b><br>
                            <span>$${item.precio} MXN</span>
                        </div>
                    </div>
                    <div>
                        Cantidad: ${item.cantidad}<br>
                        Subtotal: $${item.precioTotal}
                        <button class="quitar" data-id="${item.id}">Quitar todos</button>
                    </div>
                `;
                contenedor.appendChild(itemDiv);
                totalLibros += item.cantidad;
                totalPrecio += item.precioTotal;
            });

            totalLibrosSpan.textContent = totalLibros;
            totalPrecioSpan.textContent = totalPrecio.toFixed(2);

            // Eventos para botones "Quitar"
            document.querySelectorAll('.quitar').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const nuevoCarrito = carrito.filter(item => item.id != id);
                    localStorage.setItem('carrito', JSON.stringify(nuevoCarrito));
                    mostrarCarrito(); // refrescar
                });
            });
        }

        // Pagar
        async function pagar() {
            const carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if (carrito.length === 0) {
                mostrarMensaje('El carrito está vacío', true);
                return;
            }

            // Agrupar para obtener cantidades
            const agrupado = new Map();
            carrito.forEach(item => {
                if (agrupado.has(item.id)) {
                    agrupado.get(item.id).cantidad++;
                } else {
                    agrupado.set(item.id, { id: item.id, cantidad: 1 });
                }
            });
            const items = Array.from(agrupado.values());

            const body = { items };

            try {
                const response = await fetch('http://localhost:8080/api/carrito/comprar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.removeItem('carrito');
                    mostrarCarrito();
                    mostrarMensaje('Compra realizada con éxito');
                } else {
                    mostrarMensaje(data.error || 'Error al procesar la compra', true);
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('Error de conexión con el servidor', true);
            }
        }

        function mostrarMensaje(texto, esError = false) {
            const mensajeDiv = document.getElementById('mensaje');
            mensajeDiv.textContent = texto;
            if (esError) {
                mensajeDiv.classList.add('error');
            } else {
                mensajeDiv.classList.remove('error');
            }
            mensajeDiv.classList.add('mostrar');
            setTimeout(() => {
                mensajeDiv.classList.remove('mostrar');
            }, 3000);
        }

        document.getElementById('btn-pagar').addEventListener('click', pagar);

        document.addEventListener('DOMContentLoaded', () => {
            mostrarCarrito();
        });
    </script>
</body>
</html>
