<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Ciencia Ficción (Admin)</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_admin.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=book_5" />
        
    <style>
        body{
            margin:0;
            font-family: Arial, Helvetica, sans-serif;
        }
        .fondo{
            background-image: url("../img/logo.jpeg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            opacity: 0.30; 
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1; 
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 8px;
        }
        .modal-content input,
        .modal-content textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        .btn-agregar-libro {
            background-color: #7f5539;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 20px;
        }
        .info-libro p {
            margin: 2px 0;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../img/logo_libreria.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li class="dropdown"></li>
            <li class="dropdown">
                <i class="material-symbols-outlined" style="font-size: 24px;color:#7f5539;">book_5</i>
                <a href="../html/generos_admin.html" onclick="toggleDropdown(event)" class="active"></a>
                <li><a href="../html/generos_admin.html">Géneros</a></li>
                <ul class="dropdown-menu" id="submenu">
                    <li><a href="../html/catalogo_accion_admin.html">Acción</a></li>
                    <li><a href="../html/catalogo_terror_admin.html">Terror</a></li>
                    <li><a href="../html/catalogo_aventura_admin.html">Aventura</a></li>
                    <li><a href="../html/catalogo_ciencia_ficcion_admin.html">Ciencia Ficción</a></li>
                    <li><a href="../html/catalogo_suspenso_admin.html">Suspenso</a></li>
                    <li><a href="../html/catalogo_drama_admin.html">Drama</a></li>
                    <li><a href="../html/catalogo_infantil_admin.html">Infantil</a></li>
                    <li><a href="../html/catalogo_misterio_admin.html">Misterio</a></li>
                    <li><a href="../html/catalogo_romance_admin.html">Romance</a></li>
                </ul>
            </li>
            <i class="material-icons" style="font-size:24px;color: #7f5539;">shopping_cart</i>
            <li>
                <a href="../html/carrito_admin.html">
                    Carrito <span id="contador-carrito">0</span>
                </a>
            </li>
        </ul>
    </nav>

    <script>
        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }
        function toggleDropdown(event) {
            event.preventDefault();
            document.getElementById("submenu").classList.toggle("show");
        }
    </script>

    <div class="fondo"></div>

    <h1>Catálogo Ciencia Ficción</h1>

    <div style="text-align: right;">
        <button class="btn-agregar-libro" id="btnAgregarLibro">+ Agregar Libro</button>
    </div>

    <div class="catalogo-accion" id="contenedor-libros"></div>

    <div id="mensaje-carrito" class="mensaje-carrito">✔ Libro agregado al carrito</div>

    <div id="modalLibro" class="modal">
        <div class="modal-content">
            <h3 id="modalTitulo">Agregar Nuevo Libro</h3>
            <form id="formLibro">
                <input type="hidden" id="libroId">
                <input type="text" id="titulo" placeholder="Título" required>
                <input type="text" id="autor" placeholder="Autor" required>
                <input type="text" id="editorial" placeholder="Editorial" required>
                <input type="number" id="precio" placeholder="Precio" step="0.01" required>
                <input type="number" id="cantidad" placeholder="Cantidad" required>
                <input type="text" id="imagen" placeholder="Ruta de imagen (ej. ../img/dune.jpg)" required>
                <input type="text" id="edicion" placeholder="Edición (ej. 1, 2, 3...)">
                <input type="hidden" id="categoria" value="ciencia_ficcion">
                <div style="margin-top:10px;">
                    <button type="submit">Guardar</button>
                    <button type="button" onclick="cerrarModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        async function cargarLibros() {
            try {
                const response = await fetch('http://localhost:8080/api/libros/categoria/ciencia_ficcion');
                if (!response.ok) throw new Error('Error al cargar libros');
                const libros = await response.json();
                const contenedor = document.getElementById('contenedor-libros');
                contenedor.innerHTML = '';
                
                libros.forEach(libro => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-libro';
                    tarjeta.setAttribute('data-id', libro.id);
                    
                    const codigo = 'L-' + libro.id.toString().padStart(3, '0');
                    
                    const edicionTexto = libro.edicion ? `<p class="edicion"><strong>Edición:</strong> ${libro.edicion}</p>` : '';
                    
                    tarjeta.innerHTML = `
                        <div class="top-libro">
                            <span class="codigo-libro">${codigo}</span>
                            <button class="editar-libro" onclick="editarLibro(${libro.id})">Editar</button>
                        </div>
                        <img src="../img/${libro.imagen}" alt="${libro.titulo}" 
                             onerror="this.src='../img/logo_libreria.jpeg'">
                        <div class="info-libro">
                            <h3 class="nombre-libro">${libro.titulo}</h3>
                            <p class="autor"><strong>Autor:</strong> ${libro.autor}</p>
                            <p class="editorial"><strong>Editorial:</strong> ${libro.editorial}</p>
                            ${edicionTexto}
                            <p class="precio"><strong>Precio:</strong> $${libro.precio} MXN</p>
                            <button class="agregar" data-id="${libro.id}">Agregar al carrito</button>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                });
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudieron cargar los libros');
            }
        }

        function abrirModalAgregar() {
            document.getElementById('modalTitulo').innerText = 'Agregar Nuevo Libro';
            document.getElementById('formLibro').reset();
            document.getElementById('libroId').value = '';
            document.getElementById('modalLibro').style.display = 'block';
        }

        async function editarLibro(id) {
            try {
                const response = await fetch(`http://localhost:8080/api/libros/${id}`);
                if (!response.ok) throw new Error('No se pudo cargar el libro');
                const libro = await response.json();
                
                document.getElementById('modalTitulo').innerText = 'Editar Libro';
                document.getElementById('libroId').value = libro.id;
                document.getElementById('titulo').value = libro.titulo;
                document.getElementById('autor').value = libro.autor;
                document.getElementById('editorial').value = libro.editorial;
                document.getElementById('precio').value = libro.precio;
                document.getElementById('cantidad').value = libro.cantidad;
                document.getElementById('imagen').value = libro.imagen;
                document.getElementById('edicion').value = libro.edicion;
                document.getElementById('categoria').value = libro.categoria;
                
                document.getElementById('modalLibro').style.display = 'block';
            } catch (error) {
                console.error('Error:', error);
                alert('Error al cargar el libro para editar');
            }
        }

        function cerrarModal() {
            document.getElementById('modalLibro').style.display = 'none';
        }

        document.getElementById('formLibro').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const libroData = {
                id: document.getElementById('libroId').value || null,
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                editorial: document.getElementById('editorial').value,
                precio: parseFloat(document.getElementById('precio').value),
                cantidad: parseInt(document.getElementById('cantidad').value),
                imagen: document.getElementById('imagen').value,
                edicion: document.getElementById('edicion').value,
                categoria: document.getElementById('categoria').value,
                nombre: document.getElementById('titulo').value // opcional
            };

            const method = libroData.id ? 'PUT' : 'POST';
            const url = libroData.id 
                ? `http://localhost:8080/api/libros/${libroData.id}`
                : 'http://localhost:8080/api/libros';

            try {
                const response = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(libroData)
                });
                
                if (response.ok) {
                    cerrarModal();
                    cargarLibros(); // Recargar la lista
                } else {
                    const error = await response.text();
                    alert('Error al guardar: ' + error);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error de conexión');
            }
        });

        function inicializarCarrito() {
            const contenedor = document.getElementById('contenedor-libros');
            const contador = document.getElementById('contador-carrito');
            const mensaje = document.getElementById('mensaje-carrito');

            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if (contador) contador.textContent = carrito.length;

            contenedor.addEventListener('click', (e) => {
                const boton = e.target.closest('.agregar');
                if (!boton) return;

                const tarjeta = boton.closest('.tarjeta-libro');
                if (!tarjeta) return;

                const titulo = tarjeta.querySelector('.nombre-libro').textContent;
                const precioTexto = tarjeta.querySelector('.precio').textContent;
                const precio = parseFloat(precioTexto.replace('Precio: $', '').replace(' MXN', ''));
                const imagen = tarjeta.querySelector('img').src;

                const libro = { titulo, precio, imagen };
                carrito.push(libro);
                localStorage.setItem('carrito', JSON.stringify(carrito));
                if (contador) contador.textContent = carrito.length;

                if (mensaje) {
                    mensaje.classList.add('mostrar');
                    setTimeout(() => {
                        mensaje.classList.remove('mostrar');
                    }, 2000);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarLibros();
            inicializarCarrito();
            document.getElementById('btnAgregarLibro').addEventListener('click', abrirModalAgregar);
        });
    </script>
</body>
</html>
