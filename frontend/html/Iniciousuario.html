<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Libruarys - Inicio de Sesión</title>
        <link rel="shortcut icon" href="../img/logo.jpeg" type="image/x-icon">
        <link rel="stylesheet" href="../css/AnaCSS.css">
        <script src="../js/AnaJS.js"></script>
        
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    </head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../img/logo.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            ☰
        </div>

        <ul class="nav-links" id="navLinks">
            <li>
                <a href="index.html">
                    <i class="fa fa-home" style="font-size:24px;color: #7f5539;"></i> Inicio
                </a>
            </li>
        </ul>
    </nav>

    <h1 class="subtitle">Inicio</h1>
    <div class="login-page">
        <div class="login-container">
            <img src="../img/logo1.png" class="background-logo"/>
            <div class="login-content">
                <form id="loginForm">
                    <input type="text" id="correoLogin" placeholder="Correo" class="input-field" required>
                    <input type="password" id="passLogin" placeholder="Contraseña" class="input-field" required>
                    
                    <div class="containerbnt">
                        <button type="submit" class="button" style="border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px; width: 100%;">
                            <span class="material-symbols-outlined">login</span>
                            Iniciar Sesión
                        </button>
                    </div>

                    <div class="Content" style="margin-top: 20px;">   
                        <p style="color: #7f5539;">¿No tienes cuenta? Regístrate aquí</p>
                    </div>

                    <div class="containerbnt">
                        <a href="RegistroUsuario.html" class="button" style="text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
                            <span class="material-symbols-outlined">person_add</span>
                            Iniciar Registro
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

   <script>
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

// Usa la función validarLogin que ya está en AnaJS.js
document.getElementById('loginForm').addEventListener('submit', validarLogin);
</script>
</body>
</html>
