<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Terror</title>
    <link rel="shortcut icon" href="../img/logo_libreria.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/styless_usua.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=book_5" />
        
    <style>
        .catalogo-accion {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .tarjeta-libro {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #7f5539;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .tarjeta-libro img {
            max-width: 150px;
            height: 200px;
            object-fit: cover;
        }
        .botones {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .cantidad, .agregar {
            background-color: #7f5539;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }
        .agregar {
            background-color: #b8860b;
        }
        .mensaje-carrito {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .mensaje-carrito.mostrar {
            opacity: 1;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../img/logo_libreria.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="navLinks">
            <li class="dropdown">
                <i class="material-symbols-outlined" style="font-size: 24px;color:#7f5539;">book_5</i>
                <a href="generos_usua.html" class="active">Géneros</a>
                <ul class="dropdown-menu" id="submenu">
                    <li><a href="catalogo_accion_usua.html">Acción</a></li>
                    <li><a href="catalogo_terror_usua.html">Terror</a></li>
                    <li><a href="catalogo_aventura_usua.html">Aventura</a></li>
                    <li><a href="catalogo_ciencia_ficcion_usua.html">Ciencia Ficción</a></li>
                    <li><a href="catalogo_suspenso_usua.html">Suspenso</a></li>
                    <li><a href="catalogo_drama_usua.html">Drama</a></li>
                    <li><a href="catalogo_infantil_usua.html">Infantil</a></li>
                    <li><a href="catalogo_misterio_usua.html">Misterio</a></li>
                    <li><a href="catalogo_romance_usua.html">Romance</a></li>
                </ul>
            </li>
            <li>
                <i class="material-icons" style="font-size:24px;color: #7f5539;">shopping_cart</i>
                <a href="carrito_usua.html">Carrito <span id="contador-carrito">0</span></a>
            </li>
        </ul>
    </nav>

    <script>
        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }
    </script>

    <div class="fondo"></div>

    <h1>Catálogo Terror</h1>

    <div class="catalogo-accion" id="contenedor-libros"></div>

    <div id="mensaje-carrito" class="mensaje-carrito">✔ Libro agregado al carrito</div>

    <script>
    
        async function cargarLibros() {
            try {
                const response = await fetch('http://localhost:8080/api/libros/categoria/terror');
                if (!response.ok) throw new Error('Error al cargar libros');
                const libros = await response.json();
                const contenedor = document.getElementById('contenedor-libros');
                contenedor.innerHTML = '';
                
                libros.forEach(libro => {
                    const tarjeta = document.createElement('div');
                    tarjeta.className = 'tarjeta-libro';
                    tarjeta.setAttribute('data-id', libro.id);
                    
                    const imagenSrc = libro.imagen ? `../img/${libro.imagen}` : '../img/logo_libreria.jpeg';
                    
                    tarjeta.innerHTML = `
                        <img src="${imagenSrc}" alt="${libro.titulo}" onerror="this.src='../img/logo_libreria.jpeg'">
                        <h3>${libro.titulo}</h3>
                        <p class="autor">${libro.autor}</p>
                        <p class="precio">$${libro.precio} MXN</p>
                        <div class="botones">
                            <button class="cantidad">Cantidad ${libro.cantidad}</button>
                            <button class="agregar" data-id="${libro.id}">Agregar</button>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                });
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudieron cargar los libros');
            }
        }

        function inicializarCarrito() {
            const contenedor = document.getElementById('contenedor-libros');
            const contador = document.getElementById('contador-carrito');
            const mensaje = document.getElementById('mensaje-carrito');

            
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            if (contador) contador.textContent = carrito.length;

    
            contenedor.addEventListener('click', (e) => {
                const boton = e.target.closest('.agregar');
                if (!boton) return;

                const tarjeta = boton.closest('.tarjeta-libro');
                if (!tarjeta) return;

                // Obtener datos del libro
                const id = parseInt(boton.getAttribute('data-id')); 
                const titulo = tarjeta.querySelector('h3').textContent;
                const precioTexto = tarjeta.querySelector('.precio').textContent;
                const precio = parseFloat(precioTexto.replace('$', '').replace(' MXN', ''));
                const imagen = tarjeta.querySelector('img').src;

                const libro = { id, titulo, precio, imagen };
                carrito.push(libro);
                localStorage.setItem('carrito', JSON.stringify(carrito));
                if (contador) contador.textContent = carrito.length;

                if (mensaje) {
                    mensaje.classList.add('mostrar');
                    setTimeout(() => {
                        mensaje.classList.remove('mostrar');
                    }, 2000);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            cargarLibros();
            inicializarCarrito();
        });
    </script>
</body>
</html>
