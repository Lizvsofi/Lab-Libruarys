<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Libruarys - Registro</title>
    <link rel="shortcut icon" href="../logo.jpeg" type="image/x-icon">
    <link rel="stylesheet" href="../css/AnaCSS.css">
    <script src="../js/AnaJS.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="../logo.jpeg" alt="Logo de Libruarys"/>
            <span>Libruarys</span>
        </div>

        <div class="hamburger" onclick="toggleMenu()">
            ☰
        </div>

        <ul class="nav-links" id="navLinks">
            <li>
                <a href="../html/index.html">
                    <i class="fa fa-home" style="font-size:24px;color: #7f5539;"></i> Inicio
                </a>
            </li>
        </ul>
    </nav>

    <h1 class="subtitle">Registro de Nuevo Usuario</h1>
    
    <div class="login-page">
        <div class="login-container">
            <img src="../logo1.png" class="background-logo"/>
            <div class="login-content">
                <form id="registroForm">
                    
                    <input type="text" id="nombre" placeholder="Nombres" class="input-field" required>
                    <input type="text" id="apellidos" placeholder="Apellidos" class="input-field" required>
                    <input type="email" id="correo" placeholder="Correo Electrónico" class="input-field" required>
                    <input type="tel" id="telefono" placeholder="Teléfono" class="input-field" required>
                    
                    <div style="text-align: left; width: 80%; margin: 5px auto;">
                        <label style="font-size: 12px; color: #7f5539; font-weight: bold;">Fecha de Nacimiento:</label>
                    </div>
                    <input type="date" id="fechaNacimiento" class="input-field" required>
                    
                    <input type="text" id="direccion" placeholder="Dirección Exacta" class="input-field" required>
                    <input type="text" id="codigoPostal" placeholder="Código Postal" class="input-field" required>
                    
                    <input type="password" id="pass1" placeholder="Crear Contraseña" class="input-field" required>
                    <input type="password" id="pass2" placeholder="Repetir Contraseña" class="input-field" required>

                    <div class="Content">   
                        <p style="font-size: 11px; color: #7f5539;">
                            Al registrarte aceptas que te enviemos recomendaciones de libros de tu interés.
                        </p>    
                    </div>

                    <div class="containerbnt">
                        <button type="submit" class="button" style="border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px 20px;">
                            <span class="material-symbols-outlined">how_to_reg</span>
                            Finalizar Registro
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu(){
            document.getElementById("navLinks").classList.toggle("active");
        }

        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 

            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;

            if (p1 !== p2) {
                alert("Las contraseñas no coinciden.");
                return;
            }

            // OBJETO CORREGIDO: Ahora captura TODOS los campos para tu MySQL
            const usuarioData = {
                nombre: document.getElementById('nombre').value,
                apellidos: document.getElementById('apellidos').value,
                correo: document.getElementById('correo').value,
                telefono: document.getElementById('telefono').value,
                fechaNacimiento: document.getElementById('fechaNacimiento').value,
                direccion: document.getElementById('direccion').value,
                codigoPostal: document.getElementById('codigoPostal').value,
                contraseña: p1
            };

            try {
                const response = await fetch('http://localhost:8080/api/usuarios/registro', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(usuarioData)
                });

                if (response.ok) {
                    alert("¡Usuario registrado exitosamente en Libruarys!");
                    window.location.href = "Iniciousuario.html"; 
                } else {
                    alert("Error al registrar: " + response.status);
                }
            } catch (error) {
                console.error("Error de conexión:", error);
                alert("No se pudo conectar con el servidor. ¿Ya le diste a 'Run' en VS Code?");
            }
        });
    </script>
</body>
</html>
