spring.datasource.url=jdbc:mysql://localhost:3306/mydb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ROOT
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== LÍNEAS AGREGADAS PARA VER SQL DETALLADO =====
# Muestra todas las consultas SQL (incluyendo INSERT, UPDATE, DELETE)
logging.level.org.hibernate.SQL=DEBUG
# Muestra los valores de los parámetros que se enlazan en las consultas
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE