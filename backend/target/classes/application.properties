# Conexión a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mydb?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=ROOT

# Configuración de JPA / Hibernate
spring.jpa.show-sql=true

# --- EL CAMBIO IMPORTANTE ESTÁ AQUÍ ---
# 'none' le dice a Hibernate que NO toque la estructura de la tabla.
# Usará la tabla exactamente como la creaste en Workbench.
spring.jpa.hibernate.ddl-auto=none

# Dialecto actualizado (el anterior que tenías está marcado como obsoleto)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Para ver los valores reales de los parámetros en la consola
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE